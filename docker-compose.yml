services:
  web:
    build: .
    container_name: movie_dashboard_web
    ports:
      - "8050:8050"
    environment:
      - MONGO_URI=mongodb://db:27017
      - MONGO_DB_NAME=movie_analytics
      - MONGO_COLLECTION=movies
    depends_on:
      - db

  db:
    image: mongo:7
    container_name: movie_dashboard_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: